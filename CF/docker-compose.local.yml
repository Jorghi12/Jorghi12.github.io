services:
  postgres:
    image: postgres:16-alpine
    container_name: clubfemboy-local-postgres
    environment:
      POSTGRES_USER: myusername
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: mydatabase
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myusername -d mydatabase"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - clubfemboy-postgres:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: clubfemboy-local-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - clubfemboy-redis:/data

volumes:
  clubfemboy-postgres:
  clubfemboy-redis:
